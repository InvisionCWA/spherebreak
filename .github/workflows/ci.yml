name: CI

on:
  push:
    branches: [main]
  pull_request:

# Restrict the default GITHUB_TOKEN to read-only repository access.
# Individual jobs that need broader access can declare their own permissions.
permissions:
  contents: read

jobs:
  server-test:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: server
      - name: Run tests
        run: npm test
        working-directory: server

  server-lint:
    name: Server lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: server
      - name: Lint
        run: npm run lint
        working-directory: server

  client-test:
    name: Client tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: client
      - name: Run tests
        run: CI=true npm test -- --watch=false
        working-directory: client

  client-build:
    name: Client build
    runs-on: ubuntu-latest
    outputs:
      build-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: client
      - name: Build
        run: npm run build
        working-directory: client
      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/build
          retention-days: 1

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: client-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e
      - name: Download client build
        uses: actions/download-artifact@v4
        with:
          name: client-build
          path: client/build
      - name: Set up database
        run: |
          npx prisma db push
          node prisma/seed.js
        working-directory: server
        env:
          DATABASE_URL: file:./prisma/ci.db
      - name: Start game server
        run: node index.js &
        working-directory: server
        env:
          PORT: 3000
          DATABASE_URL: file:./prisma/ci.db
          NODE_ENV: test
      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && exit 0
            sleep 1
          done
          echo "Server did not become ready in time" && exit 1
      - name: Run E2E tests
        run: CI=true npx playwright test --project=chromium
        working-directory: e2e
        env:
          BASE_URL: http://localhost:3000
      - name: Upload E2E report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
